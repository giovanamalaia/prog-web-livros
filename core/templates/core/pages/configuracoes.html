{% extends 'core/layouts/base.html' %}
{% load static %}

{% block title %}Configurações{% endblock %}

{% block content %}

{% include 'core/components/top_bar.html' %}

<form class="profile-page-wrapper" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="profile-form-side app-custom-form">
        <p>
            <label>Username</label>
            <input type="text" name="username" value="{{ user.username }}" required>
        </p>
        <p>
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ user.first_name }}">
        </p>
        <p>
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ user.last_name }}">
        </p>
        <p>
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </p>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button type="submit" class="btn-blue">Save Changes</button>

            <a href="#" class="btn-blue-action"
                style="text-decoration: none; display: flex; align-items: center; margin: 0;">
                <i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Reset Password
            </a>
        </div>
    </div>

    <div class="profile-photo-side">
        <div class="large-avatar-container">
            {% if user.perfil.foto_perfil %}
            <img src="{{ user.perfil.foto_perfil.url }}" alt="Foto de {{ user.username }}">
            {% else %}
            <div class="avatar-placeholder-large">
                <i class="fa-solid fa-user"></i>
            </div>
            {% endif %}
        </div>

        <input type="file" name="foto_perfil" id="id_foto_perfil" style="display: none;" accept="image/*">

        <label for="id_foto_perfil" class="btn-blue-action"
            style="cursor: pointer; display: inline-block; text-align: center; width: 100%; box-sizing: border-box;">
            <i class="fa-solid fa-camera" style="margin-right: 8px;"></i> Change Photo
        </label>

        <a href="{% url 'logout' %}" class="btn-danger-action btn-logout"
            style="display: block; text-align: center; margin-top: 15px;">
            <i class="fa-solid fa-arrow-right-from-bracket" style="margin-right: 8px;"></i> log out
        </a>
    </div>
</form>

{% endblock %}
